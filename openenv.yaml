version: "1.0"
name: "MediCoder-RL"
description: "RL Environment for Revenue Cycle Integrity & ICD-10 Verification"
entrypoint: "python app.py" 
env:
  type: "fastapi"
  port: 7860 
  endpoints:
    reset: "/reset"
    step: "/step"
observation_space:
  type: "text"
  description: "Clinical Encounter Note + Feedback"
action_space:
  type: "list"
  description: "Proposed ICD-10 Codes"